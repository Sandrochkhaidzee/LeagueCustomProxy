name: CI

# Type-check, build, and test the client and server on every PR and every push
# to main. Nothing else verifies PRs, so this is the safety net — e.g. it catches
# a model retrain that breaks the classifier label test before it can merge.
# Runs entirely on GitHub-hosted runners.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build:prod
      - name: Test
        run: npm test

  server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
