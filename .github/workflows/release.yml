name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build release exe
        env:
          PROXCHAT_SERVER: http://26.36.227.156:3100
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROXCHAT_DEV_BUILD: '0'
          WEBPACK_CLEAN: '1'
        run: npx tauri build --no-bundle

      - name: Compute SHA-256
        id: hash
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No exe found in target/release" }
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          Copy-Item $exe.FullName leagueproxy.exe
          Write-Host "Built $($exe.Name) SHA-256: $hash"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: leagueproxy.exe
          generate_release_notes: true
          body: |
            ## Quick start

            1. Join the host **Radmin VPN** network (see README).
            2. Download `leagueproxy.exe` below.
            3. Verify SHA-256, then run it.
            4. League → **Borderless** → custom game with the group.

            **Host must run the signaling server** before the match (`scripts/start-server.bat`).

            ## SHA-256

            ```
            ${{ steps.hash.outputs.sha256 }}
            ```

            ## Safety

            - Custom games with friends only — not for ranked.
            - No telemetry. Voice is peer-to-peer; positions go to the host server only.
            - Fork of [LoLProxChat](https://github.com/danthi123/LoLProxChat) (AGPLv3).
