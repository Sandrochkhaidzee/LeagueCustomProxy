name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - uses: dtolnay/rust-toolchain@stable

      - name: Generate app icons
        run: npm run generate:icons

      - name: Build signaling server bundle
        run: npm ci --prefix server --no-audit --no-fund && npm run build --prefix server

      - name: Build client frontend
        env:
          PROXCHAT_DEV_BUILD: '0'
          WEBPACK_CLEAN: '1'
        run: npm run build:release

      - name: Build client exe
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tauri build --no-bundle -- --bin leagueproxy

      - name: Stage client exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/leagueproxy.exe -ErrorAction Stop
          Copy-Item $exe.FullName leagueproxy.exe
          $hash = (Get-FileHash leagueproxy.exe -Algorithm SHA256).Hash
          "client_sha256=$hash" >> $env:GITHUB_OUTPUT
        id: client_hash

      - name: Build server frontend
        env:
          PROXCHAT_DEV_BUILD: '0'
          WEBPACK_CLEAN: '1'
        run: npm run build:server

      - name: Build server exe
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tauri build --no-bundle --config src-tauri/tauri.server.conf.json -- --bin leagueproxy-server

      - name: Stage server exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/leagueproxy-server.exe -ErrorAction Stop
          Copy-Item $exe.FullName server.exe
          $hash = (Get-FileHash server.exe -Algorithm SHA256).Hash
          "server_sha256=$hash" >> $env:GITHUB_OUTPUT
        id: server_hash

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            leagueproxy.exe
            server.exe
          generate_release_notes: true
          body: |
            ## Quick start

            **Host:** download `server.exe`, enter protocol/IP/port, click **Start server**, share the URL.

            **Players:** download `leagueproxy.exe`, enter the host's protocol, IP, and port on the connect screen each launch.

            League → **Borderless** → custom game with the group.

            ## SHA-256

            **leagueproxy.exe**
            ```
            ${{ steps.client_hash.outputs.client_sha256 }}
            ```

            **server.exe**
            ```
            ${{ steps.server_hash.outputs.server_sha256 }}
            ```

            ## Safety

            - Custom games with friends only — not for ranked.
            - No telemetry. Voice is peer-to-peer; positions go to the host server only.
            - Fork of [LoLProxChat](https://github.com/danthi123/LoLProxChat) (AGPLv3).
