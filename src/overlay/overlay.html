<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoLProxChat</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <!-- Panel window. Scanner/calibration region lives in a separate Tauri window. -->
  <div id="panel" class="panel">
    <div id="drag-handle" class="widget-header" data-tauri-drag-region>
      <span class="widget-title" data-tauri-drag-region>LoLProxChat</span>
      <div class="header-controls">
        <button id="btn-self-mute" class="icon-btn" title="Toggle Self Mute">MIC</button>
        <button id="btn-mute-all" class="icon-btn" title="Mute All">VOL</button>
        <button id="btn-settings" class="icon-btn" title="Settings">SET</button>
        <button id="btn-collapse" class="icon-btn" title="Collapse">&raquo;</button>
      </div>
    </div>
    <div id="player-list" class="player-list">
      <div class="empty-state">Waiting for nearby players...</div>
    </div>
    <div id="settings-panel" class="settings-panel hidden">
      <div class="setting-row">
        <label>Input Device</label>
        <select id="input-device">
          <option value="">Default</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Output Device</label>
        <select id="output-device">
          <option value="">Default</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Input Mode</label>
        <select id="input-mode">
          <option value="always">Always Open</option>
          <option value="ptt">Push to Talk (F8)</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Mic Volume</label>
        <div class="setting-value-group">
          <input id="input-volume" type="range" min="0" max="100" value="100">
          <span id="volume-label" class="setting-value-label">100</span>
        </div>
      </div>
      <div class="setting-row">
        <label>Debug</label>
        <button id="btn-debug" class="icon-btn">OFF</button>
      </div>
      <div class="setting-row">
        <label>Debug Logs</label>
        <button id="btn-open-logs" class="icon-btn" title="Open log folder to attach to a GitHub issue">OPEN</button>
      </div>
      <div class="setting-row">
        <label>Auto-update</label>
        <button id="btn-autoupdate" class="icon-btn">OFF</button>
      </div>
      <div class="setting-row">
        <label>Updates</label>
        <button id="btn-check-update" class="icon-btn">CHECK</button>
      </div>
      <div id="update-status" style="font-size:10px;color:#8892a8;padding:4px 0;text-align:center;"></div>
      <div id="scan-rate-row" class="setting-row hidden">
        <label>Scan Rate</label>
        <div class="setting-value-group">
          <input id="input-scan-rate" type="range" min="0" max="100" value="50">
          <span id="scan-rate-label" class="setting-value-label">50</span>
        </div>
      </div>
      <div id="debug-info" class="hidden" style="font-size:10px;color:#555;padding:4px 0;text-align:center;"></div>
      <img id="debug-filter-thumb" class="hidden" alt="HSV-filtered minimap preview" />
    </div>
  </div>
  <script src="../background/background.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
